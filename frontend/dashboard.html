<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h1>TaskFlow</h1>
        <div>
            <a href="projects.html">Projets</a>
            <a href="notifications.html">
        🔔 <span id="notif-badge" style="display:none; background:red; color:white; border-radius:50%; padding:2px 6px;">0</span>
            </a>
            <button onclick="logout()">Déconnexion</button>
        </div>
    </nav>

    <div class="container">
        <h2>Mon Dashboard</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="active-projects">-</h3>
                <p>Projets actifs</p>
            </div>
            <div class="stat-card"> 
                <h3 id="total-assigned">-</h3>
                <p>Tâches assignées</p>
            </div>
            <div class="stat-card">
                <h3 id="completed">-</h3>
                <p>Tâches terminées</p>
            </div>
            <div class="stat-card" style="border-color: red;">
                <h3 id="late">-</h3>
                <p>Tâches en retard</p>
            </div>
        </div>
        <h3>📋 Tâches en cours</h3>
        <div id="in-progress-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
