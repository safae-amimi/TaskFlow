<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow — Connexion</title>
  <link rel="stylesheet" href="css/style.css">
 
</head>
<body class="auth-page">
    <nav id="navbar"></nav> 

  <div class="auth-container">
    <h1>🗂️ TaskFlow</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Connexion</button>
      <button class="tab" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- Login Form -->
    <div id="login-section">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Mot de passe" />
      <button onclick="login()">Se connecter</button>
      <p id="login-error" class="error"></p>
    </div>

    <!-- Register Form -->
    <div id="register-section" style="display:none;">
      <input type="text" id="reg-name" placeholder="Nom complet" />
      <input type="email" id="reg-email" placeholder="Email" />
      <input type="password" id="reg-password" placeholder="Mot de passe" />
      <button type="button" onclick="register()">Créer un compte</button>
      <p id="reg-error" class="error"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script src="js/auth.js"></script>

</body>
</html>
